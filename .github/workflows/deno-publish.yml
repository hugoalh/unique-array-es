# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Deno Publish"
on:
  release:
    types:
      - "published"
  workflow_dispatch:
    inputs:
      commit:
        type: "string"
        description: "Target commit SHA."
      jsr:
        type: "choice"
        description: "Whether publish to JSR."
        options:
          - "auto"
          - "false"
        default: "auto"
      npm-codeberg:
        type: "choice"
        description: "Whether publish to NPM Codeberg."
        options:
          - "auto"
          - "false"
        default: "auto"
      npm-github:
        type: "choice"
        description: "Whether publish to NPM GitHub."
        options:
          - "auto"
          - "false"
        default: "auto"
      npm-kaki87:
        type: "choice"
        description: "Whether publish to NPM KaKi87."
        options:
          - "auto"
          - "false"
        default: "auto"
      npm-npm:
        type: "choice"
        description: "Whether publish to NPM NPM."
        options:
          - "auto"
          - "false"
        default: "auto"
jobs:
  main:
    permissions:
      contents: "read"
      id-token: "write"
      packages: "write"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@v7"
        with:
          ref: "${{inputs.commit || github.ref}}"
      - name: "Setup Deno"
        uses: "denoland/setup-deno@v2"
        with:
          deno-version: "^2.9.2"
      - name: "Setup NodeJS"
        uses: "actions/setup-node@v6"
        with:
          node-version: "^24.18.0"
          check-latest: true
      - name: "Get Cache Path"
        shell: "pwsh"
        run: |-
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $True
          [PSCustomObject]$DenoInfo = ConvertFrom-Json -InputObject (
            deno info --json |
              Join-String -Separator "`n"
          ) -Depth 100
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_DENO_CACHE_PATH_ROOT=$($DenoInfo.denoDir)" -Confirm:$False -Encoding 'UTF8NoBOM'
          [PSCustomObject]$NPMConfig = ConvertFrom-Json -InputObject (
            npm config list --json |
              Join-String -Separator "`n"
          ) -Depth 100
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_NPM_CACHE_PATH_ROOT=$($NPMConfig.cache)" -Confirm:$False -Encoding 'UTF8NoBOM'
      - name: "Load Deno Cache"
        uses: "actions/cache/restore@v6"
        with:
          key: "${{runner.os}}/Deno/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          restore-keys: |-
            ${{runner.os}}/Deno/${{github.run_id}}/${{github.run_attempt}}/
            ${{runner.os}}/Deno/${{github.run_id}}/
            ${{runner.os}}/Deno/
          path: "${{env.CDV_DENO_CACHE_PATH_ROOT}}"
      - name: "Load NPM Cache"
        uses: "actions/cache/restore@v6"
        with:
          key: "${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          restore-keys: |-
            ${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/
            ${{runner.os}}/NPM/${{github.run_id}}/
            ${{runner.os}}/NPM/
          path: "${{env.CDV_NPM_CACHE_PATH_ROOT}}"
      - name: "Setup NPM Environment"
        run: |-
          npm --global config set allow-git none
          npm --global config set allow-remote none
          npm --global config set git-tag-version false
          npm --global config set logs-max 0
          npm --global config set min-release-age 1
          npm --global config set unicode true
          npm --global config set update-notifier=false
      - name: "Analyze Routes"
        shell: "pwsh"
        env:
          CDV_DISPATCH_JSR: "${{inputs.jsr || 'auto'}}"
          CDV_DISPATCH_NPM_CODEBERG: "${{inputs.npm-codeberg || 'auto'}}"
          CDV_DISPATCH_NPM_GITHUB: "${{inputs.npm-github || 'auto'}}"
          CDV_DISPATCH_NPM_KAKI87: "${{inputs.npm-kaki87 || 'auto'}}"
          CDV_DISPATCH_NPM_NPM: "${{inputs.npm-npm || 'auto'}}"
        run: |-
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $True
          [PSCustomObject]$Config = ConvertFrom-Json -InputObject (Get-Content -LiteralPath '.\deno.jsonc' -Raw -Encoding 'UTF8NoBOM') -Depth 100
          [Boolean]$JSRPublish = $Null -ine $Config.tasks.'jsr-publish'
          [Boolean]$JSRDispatch = $Env:CDV_DISPATCH_JSR -ieq 'auto' -and $JSRPublish
          [Boolean]$NPMCodebergPublish = $Null -ine $Config.tasks.'npm-codeberg-publish'
          [Boolean]$NPMCodebergDispatch = $Env:CDV_DISPATCH_NPM_CODEBERG -ieq 'auto' -and $NPMCodebergPublish
          [Boolean]$NPMGitHubPublish = $Null -ine $Config.tasks.'npm-github-publish'
          [Boolean]$NPMGitHubDispatch = $Env:CDV_DISPATCH_NPM_GITHUB -ieq 'auto' -and $NPMGitHubPublish
          [Boolean]$NPMKaKi87Publish = $Null -ine $Config.tasks.'npm-kaki87-publish'
          [Boolean]$NPMKaKi87Dispatch = $Env:CDV_DISPATCH_NPM_KAKI87 -ieq 'auto' -and $NPMKaKi87Publish
          [Boolean]$NPMNPMPublish = $Null -ine $Config.tasks.'npm-npm-publish'
          [Boolean]$NPMNPMDispatch = $Env:CDV_DISPATCH_NPM_NPM -ieq 'auto' -and $NPMNPMPublish
          Add-Content -LiteralPath $Env:GITHUB_STEP_SUMMARY -Value @"
          # Routes

          | **Name** | **Build** | **Publish** | **Dispatch** |
          |:--|:-:|:-:|:-:|
          | (General) | $(($Null -ine $Config.tasks.'build') ? 'вњ”пёЏ' : 'вќЊ') |  |  |
          | JSR | $(($Null -ine $Config.tasks.'jsr-build') ? 'вњ”пёЏ' : 'вќЊ') | $($JSRPublish ? 'вњ”пёЏ' : 'вќЊ') | $($JSRDispatch ? 'вњ”пёЏ' : 'вќЊ') |
          | NPM Codeberg | $(($Null -ine $Config.tasks.'npm-codeberg-build') ? 'вњ”пёЏ' : 'вќЊ') | $($NPMCodebergPublish ? 'вњ”пёЏ' : 'вќЊ') | $($NPMCodebergDispatch ? 'вњ”пёЏ' : 'вќЊ') |
          | NPM GitHub | $(($Null -ine $Config.tasks.'npm-github-build') ? 'вњ”пёЏ' : 'вќЊ') | $($NPMGitHubPublish ? 'вњ”пёЏ' : 'вќЊ') | $($NPMGitHubDispatch ? 'вњ”пёЏ' : 'вќЊ') |
          | NPM KaKi87 | $(($Null -ine $Config.tasks.'npm-kaki87-build') ? 'вњ”пёЏ' : 'вќЊ') | $($NPMKaKi87Publish ? 'вњ”пёЏ' : 'вќЊ') | $($NPMKaKi87Dispatch ? 'вњ”пёЏ' : 'вќЊ') |
          | NPM NPM | $(($Null -ine $Config.tasks.'npm-npm-build') ? 'вњ”пёЏ' : 'вќЊ') | $($NPMNPMPublish ? 'вњ”пёЏ' : 'вќЊ') | $($NPMNPMDispatch ? 'вњ”пёЏ' : 'вќЊ') |
          "@
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_DEPLOY_JSR=$($JSRDispatch.ToString().ToLower())"
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_DEPLOY_NPM_CODEBERG=$($NPMCodebergDispatch.ToString().ToLower())"
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_DEPLOY_NPM_GITHUB=$($NPMGitHubDispatch.ToString().ToLower())"
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_DEPLOY_NPM_KAKI87=$($NPMKaKi87Dispatch.ToString().ToLower())"
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_DEPLOY_NPM_NPM=$($NPMNPMDispatch.ToString().ToLower())"
      - name: "Build Repository"
        id: "build-general"
        if: "${{!cancelled()}}"
        run: |-
          deno task --if-present build
      - name: "Publish To JSR"
        if: "${{!cancelled() && steps.build-general.outcome == 'success' && env.CDV_DEPLOY_JSR == 'true'}}"
        run: |-
          deno task --if-present jsr-build
          deno task jsr-publish
      - name: "Publish To NPM Codeberg"
        if: "${{!cancelled() && steps.build-general.outcome == 'success' && env.CDV_DEPLOY_NPM_CODEBERG == 'true'}}"
        env:
          CDV_NPM_CODEBERG_TOKEN: "${{secrets.NPM_CODEBERG_TOKEN}}"
        run: |-
          deno task --if-present npm-codeberg-build
          deno task npm-codeberg-publish --token '^CDV_NPM_CODEBERG_TOKEN'
      - name: "Publish To NPM GitHub"
        if: "${{!cancelled() && steps.build-general.outcome == 'success' && env.CDV_DEPLOY_NPM_GITHUB == 'true'}}"
        env:
          CDV_NPM_GITHUB_TOKEN: "${{secrets.GITHUB_TOKEN}}"
        run: |-
          deno task --if-present npm-github-build
          deno task npm-github-publish --token '^CDV_NPM_GITHUB_TOKEN'
      - name: "Publish To NPM KaKi87"
        if: "${{!cancelled() && steps.build-general.outcome == 'success' && env.CDV_DEPLOY_NPM_KAKI87 == 'true'}}"
        env:
          CDV_NPM_KAKI87_TOKEN: "${{secrets.NPM_KAKI87_TOKEN}}"
        run: |-
          deno task --if-present npm-kaki87-build
          deno task npm-kaki87-publish --token '^CDV_NPM_KAKI87_TOKEN'
      - name: "Publish To NPM NPM"
        if: "${{!cancelled() && steps.build-general.outcome == 'success' && env.CDV_DEPLOY_NPM_NPM == 'true'}}"
        env:
          CDV_NPM_NPM_TOKEN: "${{secrets.NPM_NPM_TOKEN}}"
        run: |-
          deno task --if-present npm-npm-build
          deno task npm-npm-publish --provenance --token '^CDV_NPM_NPM_TOKEN'
      - name: "Save Deno Cache"
        if: "${{!cancelled()}}"
        uses: "actions/cache/save@v6"
        with:
          key: "${{runner.os}}/Deno/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          path: "${{env.CDV_DENO_CACHE_PATH_ROOT}}"
      - name: "Save NPM Cache"
        if: "${{!cancelled()}}"
        uses: "actions/cache/save@v6"
        with:
          key: "${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          path: "${{env.CDV_NPM_CACHE_PATH_ROOT}}"
