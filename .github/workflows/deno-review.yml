# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Deno Review"
on:
  pull_request:
    branches:
      - "**"
    types:
      - "edited"
      - "opened"
      - "reopened"
      - "synchronize"
  push:
    branches:
      - "**"
  workflow_dispatch:
jobs:
  main:
    name: "${{matrix.run_on}}"
    if: "${{!(github.event_name == 'pull_request' && github.event.pull_request.head.repo.id == github.event.pull_request.base.repo.id)}}"
    permissions:
      contents: "read"
    strategy:
      matrix:
        run_on:
          - "macos-latest"
          - "ubuntu-latest"
          - "windows-latest"
      fail-fast: false
    runs-on: "${{matrix.run_on}}"
    env:
      CDV_RUN_LITE: "${{matrix.run_on != 'ubuntu-latest'}}"
    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@v7"
      - name: "Setup Deno"
        uses: "denoland/setup-deno@v2"
        with:
          deno-version: "^2.9.2"
      - name: "Setup NodeJS"
        uses: "actions/setup-node@v6"
        with:
          node-version: "^24.18.0"
          check-latest: true
      - name: "Get Cache Path"
        shell: "pwsh"
        run: |-
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $True
          [PSCustomObject]$DenoInfo = ConvertFrom-Json -InputObject (
            deno info --json |
              Join-String -Separator "`n"
          ) -Depth 100
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_DENO_CACHE_PATH_ROOT=$($DenoInfo.denoDir)" -Confirm:$False -Encoding 'UTF8NoBOM'
          [PSCustomObject]$NPMConfig = ConvertFrom-Json -InputObject (
            npm config list --json |
              Join-String -Separator "`n"
          ) -Depth 100
          Add-Content -LiteralPath $Env:GITHUB_ENV -Value "CDV_NPM_CACHE_PATH_ROOT=$($NPMConfig.cache)" -Confirm:$False -Encoding 'UTF8NoBOM'
      - name: "Load Deno Cache"
        uses: "actions/cache/restore@v6"
        with:
          key: "${{runner.os}}/Deno/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          restore-keys: |-
            ${{runner.os}}/Deno/${{github.run_id}}/${{github.run_attempt}}/
            ${{runner.os}}/Deno/${{github.run_id}}/
            ${{runner.os}}/Deno/
          path: "${{env.CDV_DENO_CACHE_PATH_ROOT}}"
      - name: "Load NPM Cache"
        uses: "actions/cache/restore@v6"
        with:
          key: "${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          restore-keys: |-
            ${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/
            ${{runner.os}}/NPM/${{github.run_id}}/
            ${{runner.os}}/NPM/
          path: "${{env.CDV_NPM_CACHE_PATH_ROOT}}"
      - name: "Setup NPM Environment"
        run: |-
          npm --global config set allow-git none
          npm --global config set allow-remote none
          npm --global config set git-tag-version false
          npm --global config set logs-max 0
          npm --global config set min-release-age 1
          npm --global config set unicode true
          npm --global config set update-notifier=false
      - name: "Analyze Routes"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        shell: "pwsh"
        run: |-
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $True
          [PSCustomObject]$Config = ConvertFrom-Json -InputObject (Get-Content -LiteralPath '.\deno.jsonc' -Raw -Encoding 'UTF8NoBOM') -Depth 100
          Add-Content -LiteralPath $Env:GITHUB_STEP_SUMMARY -Value @"
          # Routes

          | **Name** | **Build** | **Check** | **Publish** |
          |:--|:-:|:-:|:-:|
          | (General) | $(($Null -ine $Config.tasks.'build') ? '✔️' : '❌') |  |  |
          | JSR | $(($Null -ine $Config.tasks.'jsr-build') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'jsr-check') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'jsr-publish') ? '✔️' : '❌') |
          | NPM Codeberg | $(($Null -ine $Config.tasks.'npm-codeberg-build') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-codeberg-check') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-codeberg-publish') ? '✔️' : '❌') |
          | NPM GitHub | $(($Null -ine $Config.tasks.'npm-github-build') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-github-check') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-github-publish') ? '✔️' : '❌') |
          | NPM KaKi87 | $(($Null -ine $Config.tasks.'npm-kaki87-build') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-kaki87-check') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-kaki87-publish') ? '✔️' : '❌') |
          | NPM NPM | $(($Null -ine $Config.tasks.'npm-npm-build') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-npm-check') ? '✔️' : '❌') | $(($Null -ine $Config.tasks.'npm-npm-publish') ? '✔️' : '❌') |
          "@
      - name: "Check Dependencies Update"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno outdated
      - name: "Check For Remote"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        shell: "pwsh"
        run: |-
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $True
          Get-ChildItem -LiteralPath '.\' -File -Recurse -Name
      - name: "Check Code"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno check
      - name: "Lint Code"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno lint --permit-no-files
      - name: "Build Repository"
        if: "${{!cancelled()}}"
        run: |-
          deno task --if-present build
      - name: "Test Code"
        if: "${{!cancelled()}}"
        run: |-
          deno test --allow-all --coverage --coverage-raw-data-only --no-check=all --no-prompt --permit-no-files --sanitize-ops --sanitize-resources --trace-leaks
      - name: "Test Code Coverage"
        if: "${{!cancelled()}}"
        shell: "pwsh"
        run: |-
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $True
          If ((Test-Path -LiteralPath '.\coverage' -PathType 'Container') -and (Get-ChildItem -LiteralPath '.\coverage' -File).Count -gt 0) {
            deno coverage
          }
      - name: "Benchmark Code"
        if: "${{!cancelled()}}"
        run: |-
          deno bench --allow-all --no-prompt --permit-no-files
      - name: "Check For JSR"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno task --if-present jsr-build
          deno task --if-present jsr-check
      - name: "Check For NPM Codeberg"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno task --if-present npm-codeberg-build
          deno task --if-present npm-codeberg-check
      - name: "Check For NPM GitHub"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno task --if-present npm-github-build
          deno task --if-present npm-github-check
      - name: "Check For NPM KaKi87"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno task --if-present npm-kaki87-build
          deno task --if-present npm-kaki87-check
      - name: "Check For NPM NPM"
        if: "${{!cancelled() && env.CDV_RUN_LITE == 'false'}}"
        run: |-
          deno task --if-present npm-npm-build
          deno task --if-present npm-npm-check
      - name: "Save Deno Cache"
        if: "${{!cancelled()}}"
        uses: "actions/cache/save@v6"
        with:
          key: "${{runner.os}}/Deno/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          path: "${{env.CDV_DENO_CACHE_PATH_ROOT}}"
      - name: "Save NPM Cache"
        if: "${{!cancelled()}}"
        uses: "actions/cache/save@v6"
        with:
          key: "${{runner.os}}/NPM/${{github.run_id}}/${{github.run_attempt}}/${{github.job}}"
          path: "${{env.CDV_NPM_CACHE_PATH_ROOT}}"
